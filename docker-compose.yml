services:
  # DATABASE — dedicated to MyDebt, not published to the host
  mydebt-postgres:
    image: postgres:16-alpine
    container_name: mydebt-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - "/volume2/Apps/MyDebt/pgdata:/var/lib/postgresql/data"
    networks:
      - mydebt-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FRONTEND — the only service published to the host.
  # nginx serves the Vue bundle and proxies /api/ to the backend.
  mydebt-frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: mydebt-frontend
    container_name: mydebt-frontend
    depends_on:
      - mydebt-backend
    ports:
      - "8081:80"
    networks:
      - mydebt-frontend
    restart: unless-stopped

  # BACKEND — not published; reached only via the frontend nginx proxy
  mydebt-backend:
    build: ./
    image: mydebt-backend
    container_name: mydebt-backend
    depends_on:
      mydebt-postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://mydebt-postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    volumes:
      - "/volume2/Apps/MyDebt/logs:/usr/app/logs"
    networks:
      - mydebt-backend
      - mydebt-frontend
    restart: unless-stopped

networks:
  mydebt-backend:
    driver: bridge
  mydebt-frontend:
    driver: bridge
